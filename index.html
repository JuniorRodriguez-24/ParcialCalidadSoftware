<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Calidad</title>

<link rel="icon" href="data:,">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    text-align:center;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,.1);
    text-align:center;
}

.valor{
    font-size:2rem;
    font-weight:bold;
    margin-top:10px;
}

.cobertura{
    border-left:8px solid green;
}

.defectos{
    border-left:8px solid red;
}

.complejidad{
    border-left:8px solid orange;
}

.tareas{
    border-left:8px solid blue;
}

button{
    margin-top:25px;
    padding:10px 20px;
    cursor:pointer;
}

</style>
</head>
<body>

<h1>📊 Dashboard de Calidad</h1>

<div class="dashboard">

    <div class="card cobertura">
        <h3>Cobertura</h3>
        <div class="valor" id="cobertura">0%</div>
    </div>

    <div class="card defectos">
        <h3>Defectos/KLOC</h3>
        <div class="valor" id="defectos">0</div>
    </div>

    <div class="card complejidad">
        <h3>Complejidad</h3>
        <div class="valor" id="complejidad">0</div>
    </div>

    <div class="card tareas">
        <h3>Total Tareas</h3>
        <div class="valor" id="total">0</div>
    </div>

</div>

<center>
    <button onclick="mostrarDashboard()">
        Actualizar Dashboard
    </button>
</center>

<script src="app.js"></script>

<script>

function mostrarDashboard(){

    const calidad = taskManager.qualityReport();
    const estadisticas = taskManager.getStatistics();

    document.getElementById("cobertura").textContent =
        calidad.cobertura;

    document.getElementById("defectos").textContent =
        calidad.defectosPorKLOC;

    document.getElementById("complejidad").textContent =
        calidad.complejidad;

    document.getElementById("total").textContent =
        estadisticas.total;
}

// Cargar automáticamente al abrir la página
mostrarDashboard();

</script>

</body>
</html>
